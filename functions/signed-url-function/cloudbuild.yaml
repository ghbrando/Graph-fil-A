steps:
  # Step 1: Install dependencies and build TypeScript
  - name: 'node:20'
    entrypoint: npm
    args: ['install']
    dir: 'functions/signed-url-function'

  - name: 'node:20'
    entrypoint: npm
    args: ['run', 'build']
    dir: 'functions/signed-url-function'

  # Step 2: Deploy Cloud Function (gen2)
  - name: 'gcr.io/cloud-builders/gcloud'
    args:
      - 'functions'
      - 'deploy'
      - 'sa-upload-fn'
      - '--gen2'
      - '--runtime=nodejs20'
      - '--region=us-central1'
      - '--source=functions/signed-url-function'
      - '--entry-point=generateUploadUrl'
      - '--trigger-http'
      - '--service-account=sa-upload-fn@${PROJECT_ID}.iam.gserviceaccount.com'
      - '--set-env-vars=GCP_PROJECT=${PROJECT_ID},GCS_BUCKET=graph-fil-a-audio,SECRET_ID=sa-upload-fn-key'
      - '--project=${PROJECT_ID}'

timeout: '1800s'
options:
  machineType: 'N1_HIGHCPU_8'
