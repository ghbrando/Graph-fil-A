swagger: '2.0'
info:
  title: GSC Signed URL API
  description: API Gateway for generating signed GCS upload URLs for browser-direct audio uploads in the Graph Fil-A project.
  version: 1.0.0
schemes:
  - https
x-google-allow: all

securityDefinitions:
  firebase:
    authorizationUrl: ""
    flow: "implicit"
    type: "oauth2"
    x-google-issuer: "https://securetoken.google.com/graph-fil-a"
    x-google-jwks_uri: "https://www.googleapis.com/service_accounts/v1/metadata/x509/securetoken@system.gserviceaccount.com"
    x-google-audiences: "graph-fil-a"

paths:
  /sessions/upload-url:
    options:
      summary: CORS preflight for upload-url
      operationId: corsUploadUrl
      x-google-backend:
        address: https://us-central1-graph-fil-a.cloudfunctions.net/sa-upload-fn
        deadline: 10.0
        jwt_audience: "https://us-central1-graph-fil-a.cloudfunctions.net/sa-upload-fn"
      responses:
        '204':
          description: "CORS preflight response"
    post:
      summary: Generate a signed GCS upload URL for browser-direct audio uploads
      operationId: generateUploadUrl
      x-google-backend:
        address: https://us-central1-graph-fil-a.cloudfunctions.net/sa-upload-fn
        deadline: 10.0
        jwt_audience: "https://us-central1-graph-fil-a.cloudfunctions.net/sa-upload-fn"
      security:
        - firebase: []
      parameters:
        - name: body
          in: body
          required: true
          schema:
            type: object
            required:
              - sessionId
            properties:
              sessionId:
                type: string
                description: "Unique session identifier"
                example: "abc123def456"
      responses:
        '200':
          description: "Signed URL generated successfully"
          schema:
            type: object
            properties:
              url:
                type: string
                description: "Time-limited (15 min) signed GCS upload URL"
              sessionId:
                type: string
                description: "The session ID from the request"
              gcsPath:
                type: string
                description: "Path in GCS where file will be stored (sessions/{sessionId}/audio.webm)"
        '400':
          description: "Invalid request (missing or malformed sessionId)"
        '401':
          description: "Unauthorized (missing or invalid Firebase JWT)"
        '500':
          description: "Server error (Secret Manager, GCS, or other internal failure)"

  /sessions/{sessionId}/chat:
    options:
      summary: CORS preflight for chat
      operationId: corsChat
      parameters:
        - name: sessionId
          in: path
          required: true
          type: string
      x-google-backend:
        address: https://chat-service-exr4aa6mja-uc.a.run.app
        path_translation: APPEND_PATH_TO_ADDRESS
        deadline: 30.0
        jwt_audience: "https://chat-service-exr4aa6mja-uc.a.run.app"
      responses:
        '204':
          description: "CORS preflight response"
    post:
      summary: Multi-turn chat about a session's knowledge graph
      operationId: chatWithSession
      x-google-backend:
        address: https://chat-service-exr4aa6mja-uc.a.run.app
        path_translation: APPEND_PATH_TO_ADDRESS
        deadline: 30.0
        jwt_audience: "https://chat-service-exr4aa6mja-uc.a.run.app"
      security:
        - firebase: []
      parameters:
        - name: sessionId
          in: path
          required: true
          type: string
          description: "Unique session identifier"
        - name: body
          in: body
          required: true
          schema:
            type: object
            required:
              - message
            properties:
              message:
                type: string
                description: "User's chat message"
                example: "Who attended the meeting?"
      responses:
        '200':
          description: "Chat response with optional node highlights"
          schema:
            type: object
            properties:
              answer:
                type: string
                description: "Plain-text response from Gemini"
              highlightNodes:
                type: array
                description: "Graph node IDs the UI should highlight"
                items:
                  type: string
        '400':
          description: "Missing or empty 'message' field"
        '401':
          description: "Unauthorized (missing or invalid Firebase JWT)"
        '404':
          description: "Session not found"
        '409':
          description: "Graph not ready for this session"
        '429':
          description: "Rate limit exceeded (>10 messages/min per session)"
        '500':
          description: "Server error (Vertex AI, Firestore, or other internal failure)"
        '502':
          description: "Model returned malformed response"

  /test:
    get:
      summary: Validates JWT and returns a mock response
      operationId: testAuth
      x-google-backend:
        address: https://www.google.com
        deadline: 10.0
      security:
        - firebase: []
      responses:
        '200':
          description: "If you see this, your JWT is valid!"
        '401':
          description: "Missing or invalid token."