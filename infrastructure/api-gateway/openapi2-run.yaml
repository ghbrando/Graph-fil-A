swagger: '2.0'
info:
  title: GSC Signed URL API
  description: API Gateway for generating signed GCS upload URLs for browser-direct audio uploads in the Graph Fil-A project.
  version: 1.0.0
schemes:
  - https

securityDefinitions:
  firebase:
    authorizationUrl: ""
    flow: "implicit"
    type: "oauth2"
    x-google-issuer: "https://securetoken.google.com/graph-fil-a"
    x-google-jwks_uri: "https://www.googleapis.com/service_accounts/v1/metadata/x509/securetoken@system.gserviceaccount.com"
    x-google-audiences: "graph-fil-a"

paths:
  /sessions/upload-url:
    post:
      summary: Generate a signed GCS upload URL for browser-direct audio uploads
      operationId: generateUploadUrl
      x-google-backend:
        address: https://us-central1-graph-fil-a.cloudfunctions.net/sa-upload-fn
        deadline: 10.0
      security:
        - firebase: []
      parameters:
        - name: body
          in: body
          required: true
          schema:
            type: object
            required:
              - sessionId
            properties:
              sessionId:
                type: string
                description: "Unique session identifier"
                example: "abc123def456"
      responses:
        '200':
          description: "Signed URL generated successfully"
          schema:
            type: object
            properties:
              url:
                type: string
                description: "Time-limited (15 min) signed GCS upload URL"
              sessionId:
                type: string
                description: "The session ID from the request"
              gcsPath:
                type: string
                description: "Path in GCS where file will be stored (sessions/{sessionId}/audio.mp3)"
        '400':
          description: "Invalid request (missing or malformed sessionId)"
        '401':
          description: "Unauthorized (missing or invalid Firebase JWT)"
        '500':
          description: "Server error (Secret Manager, GCS, or other internal failure)"

  /test:
    get:
      summary: Validates JWT and returns a mock response
      operationId: testAuth
      x-google-backend:
        address: https://www.google.com
        deadline: 10.0
      security:
        - firebase: []
      responses:
        '200':
          description: "If you see this, your JWT is valid!"
        '401':
          description: "Missing or invalid token."