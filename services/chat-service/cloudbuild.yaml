steps:
  # ── Step 1: Build container image ─────────────────────────────────────────
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/${PROJECT_ID}/chat-service:latest'
      - 'services/chat-service'

  # ── Step 2: Push image to Container Registry ───────────────────────────────
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/${PROJECT_ID}/chat-service:latest'

  # ── Step 3: Deploy to Cloud Run ────────────────────────────────────────────
  - name: 'gcr.io/cloud-builders/gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'chat-service'
      - '--image=gcr.io/${PROJECT_ID}/chat-service:latest'
      - '--region=us-central1'
      - '--platform=managed'
      - '--service-account=sa-chat-svc@${PROJECT_ID}.iam.gserviceaccount.com'
      # No unauthenticated access — API Gateway invokes with an OIDC token
      - '--no-allow-unauthenticated'
      - '--memory=512Mi'
      - '--cpu=1'
      - '--timeout=60'
      - '--concurrency=20'
      - '--min-instances=0'
      - '--max-instances=5'
      - '--set-env-vars=GCP_PROJECT=${PROJECT_ID},REGION=us-central1,GEMINI_MODEL=gemini-2.5-flash,RATE_LIMIT_PER_MIN=10'
      - '--project=${PROJECT_ID}'

timeout: '1800s'
options:
  machineType: 'N1_HIGHCPU_8'
